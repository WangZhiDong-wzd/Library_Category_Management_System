        <iframe src="dashboard.html" name="main" class="iframe" title="主内容区域 — 显示当前选中功能的页面内容"></iframe>

    <!-- ==================== 初始化默认数据 ==================== -->

        数据存储策略说明：
        ------------------------------------------------------------------
        sessionStorage 用于存储【图书类别】和【用户等级】数据。
        原因：这两类数据属于系统配置/参考数据，每次打开新的浏览器会话时，
        应使用默认值初始化。这样既能保证多标签页之间数据隔离，也能避免
        用户无意中将错误配置持久化到本地。关闭标签页后这些数据自动清除。

        localStorage 用于存储【订单】数据。
        原因：订单数据是核心业务数据，用户期望跨浏览器会话保留。即使关闭
        浏览器，下次打开时仍能看到已有订单记录。localStorage 没有过期时间，
        数据会永久保留，除非用户手动清除浏览器数据或代码显式删除。
        ------------------------------------------------------------------
    -->
    <script>
        $(function () {
            // ============================================================
            // 初始化【图书类别】默认数据
            // 数据结构：[{ id: 数字, name: 字符串 }]
            // - id:   类别的唯一标识（主键）
            // - name: 类别名称，用于菜单筛选和图书分类展示
            // ============================================================
            if (!sessionStorage.getItem("categories")) {
                const defaultCategories = [
                    { id: 1, name: "文字" },
                    { id: 2, name: "化学" },
                    { id: 3, name: "历史" },
                    { id: 4, name: "计算机" }
                ];
                sessionStorage.setItem("categories", JSON.stringify(defaultCategories));
            }

            // ============================================================
            // 初始化【用户等级】默认数据
            // 数据结构：[{ id: 数字, name: 字符串, level: 数字 }]
            // - id:    等级的唯一标识
            // - name:  等级名称（如"普通会员""高级会员""VIP会员"）
            // - level: 等级数值，数值越高代表等级越高，
            //          可用于排序和权益判断
            // ============================================================
            if (!sessionStorage.getItem("grades")) {
                const defaultGrades = [
                    { id: 1, name: "普通会员", level: 1 },
                    { id: 2, name: "高级会员", level: 2 },
                    { id: 3, name: "VIP会员", level: 3 }
                ];
                sessionStorage.setItem("grades", JSON.stringify(defaultGrades));
            }

            // ============================================================
            // 初始化【订单】默认数据（存入 localStorage，持久保留）
            // 数据结构：[{ ... }]
            // - id:          订单内部唯一ID（自增主键）
            // - orderNo:     订单编号（如 ORD202605010001，格式：ORD + 日期 + 序号）
            // - bookTitle:   图书名称
            // - username:    下单用户名
            // - quantity:    购买数量
            // - unitPrice:   图书单价（元）
            // - totalPrice:  订单总价 = unitPrice × quantity（元）
            // - status:      订单状态：pending(待处理) / shipped(已发货)
            //                         / completed(已完成) / cancelled(已取消)
            // - orderDate:   下单时间（格式：YYYY-MM-DD HH:mm:ss）

    <!-- ==================== 菜单交互逻辑 ==================== -->
    <!--
        菜单交互说明：
        ------------------------------------------------------------------
        1. 一级菜单 hover：鼠标悬停时添加高亮样式（CSS class "first"）
        2. 二级菜单 hover：鼠标悬停时添加高亮样式（CSS class "second"）
        3. 一级菜单点击：
           - 无子菜单的项（如"数据分析"）：不拦截事件，浏览器正常跳转
           - 有子菜单的项（如"图书管理"）：阻止默认跳转，展开/收起二级菜单，
             同时为当前一级菜单添加 active 高亮状态
        4. 二级菜单点击：为当前项添加 highlight 高亮状态，并移除其他项的样式
        ------------------------------------------------------------------
    -->
    <script>
        $(function () {
            // ----------------------------------------------------------
            // 一级菜单 hover 效果：鼠标进入添加高亮，移出移除高亮
            // 选择器 ".menu>ul>li>a" 仅匹配一级菜单的直接子 <a> 元素
            // ----------------------------------------------------------
            $(".menu>ul>li>a").hover(function () {
                $(this).addClass("first");
            }, function () {
                $(this).removeClass("first");
            });

            // ----------------------------------------------------------
            // 二级菜单 hover 效果：鼠标进入添加高亮，移出移除高亮
            // 选择器 ".sub-menu li a" 匹配所有子菜单中的链接
            // ----------------------------------------------------------
            $(".sub-menu li a").hover(function () {
                $(this).addClass("second");
            }, function () {
                $(this).removeClass("second");
            });

            // ----------------------------------------------------------
            // 一级菜单点击：展开/收起二级菜单并设置高亮状态
            // ----------------------------------------------------------
            $(".menu>ul>li>a").click(function (event) {
                // 获取当前一级菜单项后的子菜单元素
                const subMenu = $(this).next(".sub-menu");

                // 如果没有子菜单（如"数据分析"链接），不拦截默认行为，
                // 让浏览器正常跳转到对应页面（通过 iframe 的 target="main"）
                if (subMenu.length === 0) return;

                // 有子菜单时，阻止 <a> 标签的默认跳转行为（href="#"）
                event.preventDefault();

                // 如果当前子菜单是隐藏状态，先将其他已打开的子菜单收起，
                // 实现手风琴效果：同一时间只展开一个子菜单
                if (subMenu.css("display") === "none") {
                    $(".sub-menu").slideUp();
                }
                // 切换当前子菜单的显示/隐藏状态（带动画）
                subMenu.stop().slideToggle();

                // 移除所有一级菜单的 active 状态，再为当前项添加，
                // 确保只有一个一级菜单项处于高亮状态
                $(".menu>ul>li>a").removeClass("active");
                $(this).addClass("active");

                // 展开/收起子菜单时清除二级菜单的高亮状态，
                // 避免残留的高亮样式造成视觉混淆
                $(".sub-menu li a").removeClass("highlight");
            });

            // ----------------------------------------------------------
            // 二级菜单点击高亮：点击子菜单项时高亮当前项
            // ----------------------------------------------------------
            $(".sub-menu li a").click(function () {
                // 移除所有二级菜单项的高亮样式
                $(".sub-menu li a").removeClass("highlight");
                // 为当前点击的项添加高亮样式
                $(this).addClass("highlight");
            });
        });
    </script>
</body>

</html>
